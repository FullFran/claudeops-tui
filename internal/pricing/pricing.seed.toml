# claudeops pricing seed.
#
# Prices are in EUR per 1,000,000 tokens, split into the four token classes
# billed separately. Covers Claude plus other providers (OpenAI/Codex, Gemini)
# so multi-source ingestion prices correctly. Edit as providers update pricing.
#
# Sources: https://platform.claude.com/docs/en/about-claude/pricing (Claude)
#          https://github.com/BerriAI/litellm model_prices dataset (others)
# Currency: EUR.  Adjust if you want USD — the calculator does not convert.
# EUR figures are USD list price x 0.92.
#
# updated: 2026-07-11

updated = "2026-07-11"
currency = "EUR"

# Fable 5 tier: $10 in / $50 out / $1.00 cache-read / $12.50 cache-write(5m).
# New top tier above Opus. Claude Code may report it with a context-window
# suffix ("claude-fable-5[1m]"); the calculator strips bracket suffixes and
# falls back to this entry.
[models."claude-fable-5"]
input         =  9.20
output        = 46.00
cache_read    =  0.92
cache_create  = 11.50

