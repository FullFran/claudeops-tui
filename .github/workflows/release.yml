name: release

# Build cross-platform binaries and publish a GitHub Release whenever a
# version tag (vX.Y.Z) is pushed. Keeps tags and Releases in sync — no more
# tagging without a matching Release.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Build binaries
        run: |
          mkdir -p dist
          version="${GITHUB_REF_NAME}"
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            os="${target%/*}"; arch="${target#*/}"; ext=""
            [ "$os" = "windows" ] && ext=".exe"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
              go build -ldflags "-s -w" \
              -o "dist/claudeops-${version}-${os}-${arch}${ext}" ./cmd/claudeops
          done

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
